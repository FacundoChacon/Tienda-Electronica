# Conexion a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/tienda?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# update: crea/actualiza tablas automaticamente a partir de las entidades (util en desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Datos de prueba (data.sql)
# defer-datasource-initialization=true: espera a que Hibernate cree las tablas
# ANTES de ejecutar data.sql (si no, data.sql se ejecuta primero y falla porque
# las tablas todavia no existen).
spring.jpa.defer-datasource-initialization=true
# never: NO ejecuta data.sql en cada arranque. Antes estaba en "always" para
# resetear el catalogo de prueba en cada reinicio (util mientras iterabamos
# rapido), pero ahora que hay productos cargados a mano desde el panel admin,
# "always" los borraria en cada reinicio del backend. Si en algun momento
# necesitas volver a un estado limpio con los 12 productos originales de
# ejemplo, cambia esto a "always" por una sola vez y volve a "never" despues.
spring.sql.init.mode=never

# Puerto del servidor
server.port=8080

# Configuracion de JWT (clave secreta y duracion del token en milisegundos)
# IMPORTANTE: esta clave es solo de ejemplo para desarrollo local. En un entorno
# real debe ir en una variable de entorno, NUNCA en el repositorio (agregar este
# archivo a .gitignore una vez que tenga datos sensibles reales).
# Debe tener al menos 32 caracteres (256 bits) para HMAC-SHA256.
jwt.secret=clave-secreta-de-desarrollo-cambiar-en-produccion-12345
jwt.expiration=86400000

# Swagger UI disponible en /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
