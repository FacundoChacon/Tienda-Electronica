# Conexion a la base de datos MySQL
# Las variables ${...} se leen de variables de entorno si existen (asi funciona
# en Render/produccion); si no existen, se usa el valor despues de los ":" como
# default, que es lo que se usa en desarrollo local sin tener que configurar nada.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# update: crea/actualiza tablas automaticamente a partir de las entidades (util en desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Datos de prueba (data.sql)
# defer-datasource-initialization=true: espera a que Hibernate cree las tablas
# ANTES de ejecutar data.sql (si no, data.sql se ejecuta primero y falla porque
# las tablas todavia no existen).
spring.jpa.defer-datasource-initialization=true
# never: NO ejecuta data.sql en cada arranque. Antes estaba en "always" para
# resetear el catalogo de prueba en cada reinicio (util mientras iterabamos
# rapido), pero ahora que hay productos cargados a mano desde el panel admin,
# "always" los borraria en cada reinicio del backend. Si en algun momento
# necesitas volver a un estado limpio con los 12 productos originales de
# ejemplo, cambia esto a "always" por una sola vez y volve a "never" despues.
spring.sql.init.mode=always

# Puerto del servidor: Render inyecta su propia variable PORT y espera que la app
# escuche en ese puerto especifico (no siempre es 8080). El default 8080 se usa
# solo en desarrollo local, donde no existe la variable de entorno PORT.
server.port=${PORT:8080}

# Configuracion de JWT (clave secreta y duracion del token en milisegundos)
# En produccion, JWT_SECRET se configura como variable de entorno en Render,
# nunca se sube al repositorio. El valor por defecto solo aplica en desarrollo local.
jwt.secret=${JWT_SECRET:clave-secreta-de-desarrollo-cambiar-en-produccion-12345}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Swagger UI disponible en /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
