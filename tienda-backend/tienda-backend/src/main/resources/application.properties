# Conexion a la base de datos MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=tu_password_aqui
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
# update: crea/actualiza tablas automaticamente a partir de las entidades (util en desarrollo)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Puerto del servidor
server.port=8080

# Configuracion de JWT (clave secreta y duracion del token en milisegundos)
# IMPORTANTE: en un entorno real, jwt.secret debe ir en una variable de entorno, nunca en el repositorio.
jwt.secret=cambiar_esta_clave_por_una_propia_de_al_menos_256_bits
jwt.expiration=86400000

# Swagger UI disponible en /swagger-ui.html
springdoc.swagger-ui.path=/swagger-ui.html
